<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Config</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f3f2f1;
    }
    .box {
      background: white;
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 { color: #0078d4; margin-bottom: 8px; }
    p  { color: #605e5c; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🤖 AI Agent Docs</h2>
    <p>Bấm <strong>Save</strong> để thêm tab vào kênh.</p>
  </div>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.setValidityState(true);
      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        microsoftTeams.pages.config.setConfig({
          suggestedDisplayName: "AI Agent",
          entityId: "aiagent-docs",
          contentUrl: "https://teams-ai-app.vercel.app/",
          websiteUrl: "https://teams-ai-app.vercel.app/",
        });
        saveEvent.notifySuccess();
      });
    });
  </script>
</body>
</html>
