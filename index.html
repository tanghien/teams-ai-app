<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent — SharePoint Docs - by TangHien</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111318;
      --border:    #1e2330;
      --border-hi: #2e3a50;
      --accent:    #00d4ff;
      --accent-dim:#004d66;
      --green:     #00ff88;
      --green-dim: #003322;
      --red:       #ff4455;
      --text:      #c8d4e0;
      --text-dim:  #4a5568;
      --text-mid:  #7a8fa6;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeDown 0.5s ease both;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }
    .logo-box::before {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--accent-dim);
    }
    .logo-box svg {
      position: relative;
      z-index: 1;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .header-text p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 0.1em;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    /* ── Chat area ── */
    .chat-area {
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* Welcome message */
    .welcome {
      border: 1px solid var(--border);
      padding: 20px;
      background: var(--surface);
      animation: fadeUp 0.6s ease both;
      animation-delay: 0.1s;
    }
    .welcome-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .welcome p {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.7;
    }
    .welcome p strong {
      color: var(--text);
      font-weight: 500;
    }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.3s ease both;
    }

    .msg-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-left: 2px;
    }

    .msg.user .msg-label { color: var(--accent); opacity: 0.7; }
    .msg.agent .msg-label { color: var(--green); opacity: 0.7; }
    .msg.error .msg-label { color: var(--red); opacity: 0.7; }

    .msg-body {
      padding: 14px 16px;
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.7;
      background: var(--surface);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-body {
      border-color: var(--accent-dim);
      background: #07151e;
      color: var(--text);
    }

    .msg.agent .msg-body {
      border-color: var(--green-dim);
      background: #051a0f;
      color: var(--text);
      font-family: var(--sans);
    }

    .msg.error .msg-body {
      border-color: #3a1520;
      background: #180810;
      color: #ff8891;
      font-size: 12px;
    }

    /* Thinking animation */
    .thinking .msg-body {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 4px; height: 4px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Input area ── */
    .input-area {
      padding: 16px 0 20px;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.2s;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-hi);
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .input-prefix {
      padding: 0 12px;
      display: flex;
      align-items: center;
      color: var(--accent);
      font-size: 13px;
      border-right: 1px solid var(--border);
      user-select: none;
      flex-shrink: 0;
    }

    #q {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      caret-color: var(--accent);
    }
    #q::placeholder { color: var(--text-dim); }

    #ask-btn {
      padding: 0 20px;
      background: var(--accent-dim);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    #ask-btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
    }
    #ask-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }
    .hint kbd {
      background: var(--border);
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-mid);
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="logo-box">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8L8 2L14 8L8 14L2 8Z" stroke="#00d4ff" stroke-width="1.2"/>
        <circle cx="8" cy="8" r="2" fill="#00d4ff"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AI Agent  - by TangHien</h1>
      <p>SharePoint · site SOP</p>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      ONLINE
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-area" id="chat">
    <div class="welcome">
      <div class="welcome-label">// SYSTEM READY</div>
      <p>
        Xin chào. Tôi là agent kết nối với <strong>SharePoint</strong> của bạn.<br/>
        Hãy đặt câu hỏi về tài liệu — tôi sẽ tìm và tổng hợp thông tin liên quan.
      </p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <span class="input-prefix">&gt;_</span>
      <input id="q" type="text" placeholder="Nhập câu hỏi về tài liệu..." autocomplete="off" />
      <button id="ask-btn" onclick="ask()">GỬI</button>
    </div>
    <p class="hint">Nhấn <kbd>Enter</kbd> để gửi · <kbd>Shift+Enter</kbd> để xuống dòng</p>
  </div>

</div>

<script>
  const chatEl  = document.getElementById('chat');
  const inputEl = document.getElementById('q');
  const btnEl   = document.getElementById('ask-btn');

  // Enter to send
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      ask();
    }
  });

  function addMsg(type, labelText, content) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${type}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = labelText;

    const body = document.createElement('div');
    body.className = 'msg-body';

    if (type === 'thinking') {
      body.innerHTML = `
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <span>Đang xử lý...</span>`;
    } else {
      body.textContent = content;
    }

    wrap.appendChild(label);
    wrap.appendChild(body);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  async function ask() {
    const q = inputEl.value.trim();
    if (!q) return;

    // Render user message
    addMsg('user', '// YOU', q);
    inputEl.value = '';
    btnEl.disabled = true;

    // Thinking indicator
    const thinkingEl = addMsg('thinking', '// AGENT', '');

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      const data = await res.json();
      thinkingEl.remove();

      if (data.error || data.crash) {
        // Show error details
        const detail = data.detail
          ? JSON.stringify(data.detail, null, 2)
          : (data.message || 'Không có thông tin lỗi');
        addMsg('error', '// ERROR', `${data.error || data.message}\n\n${detail}`);
      } else if (data.answer) {
        addMsg('agent', '// AGENT', data.answer);
      } else {
        // Debug: show raw response
        addMsg('agent', '// RAW RESPONSE', JSON.stringify(data, null, 2));
      }

    } catch (err) {
      thinkingEl.remove();
      addMsg('error', '// NETWORK ERROR', `Không thể kết nối tới server.\n${err.message}`);
    }

    btnEl.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
