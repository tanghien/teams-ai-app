<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI Agent</title>
</head>
<body>
  <h2>🤖 AI Agent (Groq + SharePoint)</h2>

  <input id="q" placeholder="Hỏi tài liệu..." style="width:300px" />
  <button onclick="ask()">Hỏi</button>

  <pre id="res"></pre>

  <script>
    async function ask() {
      const q = document.getElementById("q").value;

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: q })
      });

      const data = await res.json();
      document.getElementById("res").innerText = data.answer;
    }
  </script>
</body>
</html>
